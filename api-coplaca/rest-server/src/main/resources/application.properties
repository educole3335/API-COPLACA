spring.application.name=apirest
spring.profiles.default=dev
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Server Port
server.port=8080

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:4200,http://localhost:4201,http://localhost:8081,http://localhost:8082,http://localhost:3000,http://localhost:3001
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=Authorization,Content-Type,Accept,X-Requested-With
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# JWT Configuration
app.jwt-secret=${JWT_SECRET}
app.jwt-expiration-ms=${JWT_EXPIRATION_MS:86400000}
