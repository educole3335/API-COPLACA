services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 1234qwerty
      MYSQL_DATABASE: proyecto
      MYSQL_USERNAME: usuario_proyecto
      MYSQL_PASSWORD: 1234qwerty
    ports:
      - "3306:3306"
    volumes:
      - ./db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_DATABASE: proyecto
      PMA_USER: root
      PMA_PASSWORD: 1234qwerty
    ports:
      - "8081:80"

volumes:
  db_data: