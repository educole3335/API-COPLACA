spring.application.name=apirest
spring.datasource.url=${DB_URL:jdbc:h2:mem:coplaca;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt-secret=${JWT_SECRET:CoplacaJwtSecretKey2026CoplacaJwtSecretKey2026}
app.jwt-expiration-ms=${JWT_EXPIRATION_MS:86400000}
